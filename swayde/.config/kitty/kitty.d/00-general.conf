# General behavior.
url_prefixes                http https gemini
url_style                   curly
strip_trailing_spaces       smart
enable_audio_bell           no
cursor_shape                block
cursor_blink_interval       -1
cursor_stop_blinking_after  15
window_padding_width        10
allow_remote_control        yes
# Path-based socket so it works on macOS too (abstract `unix:@name` is Linux-only).
# ${KITTY_PID} keeps it unique per instance.
listen_on                   unix:/tmp/mykitty-${KITTY_PID}

# Auto-save OS window state when its last window closes (used by ksessions).
watcher                     kittens/ksessions.py

# Tab bar — simple, theme-colored. Shows whatever the active window sets via
# OSC title (claude/aider prompt snippets, shell cwd, etc.), plus layout and
# resize-mode indicator. Title truncated to 40 chars to keep tabs uniform.
tab_bar_edge                top
tab_bar_margin_width        10
tab_bar_margin_height       15 0
tab_bar_style               fade
tab_fade                    0
tab_title_max_length        50
tab_title_template          " {index}:{title:.40} [{layout_name}]{keyboard_mode} "
active_tab_title_template   " {index}:{title:.40} [{layout_name}]{keyboard_mode} "

# Fonts.
font_family                 Operator Mono SSm Book Nerd Font Complete
bold_font                   Operator Mono SSm Bold Nerd Font Complete
italic_font                 Operator Mono SSm Book Italic Nerd Font Complete
bold_italic_font            Operator Mono SSm Bold Italic Nerd Font Complete
# font_size                 10
font_features               OperatorMonoSSmNerdFontComplete-BookItalic ss03 ss08
font_features               OperatorMonoSSmNerdFontComplete-BoldItalic ss03 ss08
font_features               OperatorMonoSSmNerdFontComplete-Book ss03 ss08
font_features               OperatorMonoSSmNerdFontComplete-Bold ss03 ss08
