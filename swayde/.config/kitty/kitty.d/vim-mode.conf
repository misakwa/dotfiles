# =============================================================================
# vim-mode.conf — vim-style navigation for kitty (tabs / windows / layouts)
# Sourced from kitty.conf via `include vim-mode.conf`.
#
# Two parallel binding sets:
#   1. kitty_mod+<key>     — kitty-native single-chord (kitty_mod = ctrl+shift).
#   2. ctrl+a>...          — tmux-style leader chord.
#
# PREFIX: to change the leader, find/replace `ctrl+a>` -> `ctrl+space>` (or any
# other key) and update the `send_text` line below so the literal byte for your
# new prefix still reaches the shell.
# =============================================================================

# Keep shell's beginning-of-line (C-a) reachable.
map ctrl+a>a            send_text all \x01

# -----------------------------------------------------------------------------
# Layouts
# -----------------------------------------------------------------------------
# splits = vim-style binary splits; stack = "zoom"; tall/fat/grid = tiling.
# (Also set at the bottom of kitty.conf so this wins over the original
#  `enabled_layouts horizontal` line earlier in that file.)
enabled_layouts         splits,stack,tall,fat,grid

# -----------------------------------------------------------------------------
# Window (split) navigation — vim hjkl
# -----------------------------------------------------------------------------
map kitty_mod+h         neighboring_window left
map kitty_mod+j         neighboring_window down
map kitty_mod+k         neighboring_window up
map kitty_mod+l         neighboring_window right

map ctrl+a>h            neighboring_window left
map ctrl+a>j            neighboring_window down
map ctrl+a>k            neighboring_window up
map ctrl+a>l            neighboring_window right

# Move (swap) windows in the current direction — capital HJKL.
map kitty_mod+shift+h   move_window left
map kitty_mod+shift+j   move_window down
map kitty_mod+shift+k   move_window up
map kitty_mod+shift+l   move_window right

map ctrl+a>shift+h      move_window left
map ctrl+a>shift+j      move_window down
map ctrl+a>shift+k      move_window up
map ctrl+a>shift+l      move_window right

# Splits (only meaningful in the `splits` layout).
map kitty_mod+\         launch --location=vsplit --cwd=current
map kitty_mod+minus     launch --location=hsplit --cwd=current
map ctrl+a>\            launch --location=vsplit --cwd=current
map ctrl+a>minus        launch --location=hsplit --cwd=current
# `ctrl+a>|` requires shift; bind it explicitly so muscle memory works.
map ctrl+a>shift+\      launch --location=vsplit --cwd=current

# Close current window and toggle stack (zoom).
map kitty_mod+w         close_window
map ctrl+a>x            close_window
map kitty_mod+z         toggle_layout stack
map ctrl+a>z            toggle_layout stack

# Rotate splits in the splits layout.
map ctrl+a>o            layout_action rotate

# -----------------------------------------------------------------------------
# Resize sub-mode — `ctrl+a>r` then hjkl to resize, Escape to exit
# -----------------------------------------------------------------------------
# `--new-mode` on the first binding declares the mode; the second just enters it.
map --new-mode resize ctrl+a>r
map kitty_mod+r         push_keyboard_mode resize

map --mode resize h     resize_window narrower 2
map --mode resize j     resize_window shorter 2
map --mode resize k     resize_window taller 2
map --mode resize l     resize_window wider 2
map --mode resize =     resize_window reset
map --mode resize escape pop_keyboard_mode
map --mode resize enter  pop_keyboard_mode

# One-shot resize without entering the mode.
map kitty_mod+alt+h     resize_window narrower 2
map kitty_mod+alt+j     resize_window shorter 2
map kitty_mod+alt+k     resize_window taller 2
map kitty_mod+alt+l     resize_window wider 2

# -----------------------------------------------------------------------------
# Tabs
# -----------------------------------------------------------------------------
map kitty_mod+t         new_tab_with_cwd
map ctrl+a>c            new_tab_with_cwd

map kitty_mod+q         close_tab
map ctrl+a>ampersand    close_tab

map kitty_mod+]         next_tab
map kitty_mod+[         previous_tab
map ctrl+a>n            next_tab
map ctrl+a>p            previous_tab

map kitty_mod+tab       goto_tab -1
map ctrl+a>tab          goto_tab -1

map kitty_mod+1         goto_tab 1
map kitty_mod+2         goto_tab 2
map kitty_mod+3         goto_tab 3
map kitty_mod+4         goto_tab 4
map kitty_mod+5         goto_tab 5
map kitty_mod+6         goto_tab 6
map kitty_mod+7         goto_tab 7
map kitty_mod+8         goto_tab 8
map kitty_mod+9         goto_tab 9

map ctrl+a>1            goto_tab 1
map ctrl+a>2            goto_tab 2
map ctrl+a>3            goto_tab 3
map ctrl+a>4            goto_tab 4
map ctrl+a>5            goto_tab 5
map ctrl+a>6            goto_tab 6
map ctrl+a>7            goto_tab 7
map ctrl+a>8            goto_tab 8
map ctrl+a>9            goto_tab 9

map kitty_mod+comma     move_tab_backward
map kitty_mod+period    move_tab_forward
map ctrl+a>shift+comma  move_tab_backward
map ctrl+a>shift+period move_tab_forward

# Rename current tab (prompts in overlay).
map kitty_mod+shift+r   set_tab_title
map ctrl+a>comma        set_tab_title

# -----------------------------------------------------------------------------
# Layout switching
# -----------------------------------------------------------------------------
map ctrl+a>space        next_layout
map ctrl+a>s            goto_layout splits
map ctrl+a>t            goto_layout tall
map ctrl+a>f            goto_layout fat
map ctrl+a>g            goto_layout grid
map ctrl+a>semicolon    last_used_layout

# -----------------------------------------------------------------------------
# Copy mode (scrollback) and pickers (hints)
# -----------------------------------------------------------------------------
# Open scrollback in a pager overlay — vi keys, `/` to search, `v` select, `y` yank.
map kitty_mod+slash     show_scrollback
map ctrl+a>escape       show_scrollback

# Just the last command's output (clean view, no shell prompts).
map kitty_mod+f         show_last_command_output

# URL/path/line hints — keyboard-only selection.
map ctrl+a>u            kitten hints --type url --program default
map ctrl+a>shift+p      kitten hints --type path --program -
map ctrl+a>y            kitten hints --type line --program @

# -----------------------------------------------------------------------------
# Reload / help
# -----------------------------------------------------------------------------
map ctrl+a>r            load_config_file
map kitty_mod+f5        load_config_file

# -----------------------------------------------------------------------------
# Sessions — native kitty actions for save/pick/jump; the kittens/ksessions.py
# watcher fills in auto-save-on-close, claude --continue rewriting, and TTL.
# -----------------------------------------------------------------------------
map ctrl+a>shift+s      kitten kittens/ksessions.py save
map ctrl+a>shift+r      goto_session ~/.config/kitty/sessions
map ctrl+a>minus        goto_session -1
map ctrl+a>shift+4      kitten kittens/ksessions.py name
