globinclude kitty.d/*.conf

# Theme managed by `kitten themes`. To switch: `kitten themes` (interactive) or
# `kitten themes Catppuccin-Latte` (direct). Edits the BEGIN/END block below
# and writes ~/.config/kitty/current-theme.conf (per-machine, not in dotfiles).
# Fresh-checkout bootstrap: `kitten themes Catppuccin-Frappe`.

# BEGIN_KITTY_THEME
# Catppuccin-Frappe
include current-theme.conf
# END_KITTY_THEME
